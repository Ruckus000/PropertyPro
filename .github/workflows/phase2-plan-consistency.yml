name: Phase 2 Plan Consistency

on:
  pull_request:
    paths:
      - PHASE2_EXECUTION_PLAN.md
      - IMPLEMENTATION_PLAN.md
      - scripts/verify-phase2-plan-status.ts
  workflow_dispatch:

jobs:
  verify-phase2-plan-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Phase 2 plan status consistency
        run: pnpm plan:verify:phase2
