name: Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: propertypro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/propertypro_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/propertypro_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stub Supabase primitives
        run: |
          psql "$DATABASE_URL" <<'SQL'
          -- Stub Supabase auth schema, roles, and functions so migrations
          -- can run against plain Postgres 16 in CI.

          -- Roles used by RLS policies
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN;
            END IF;
          END $$;

          -- Grant usage so policies referencing these roles can be created
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;

          -- Auth schema and helpers
          CREATE SCHEMA IF NOT EXISTS auth;

          CREATE OR REPLACE FUNCTION auth.uid()
            RETURNS uuid
            LANGUAGE sql
            STABLE
          AS $$ SELECT NULL::uuid; $$;

          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid()
          );
          SQL

      - name: Run migrations
        run: pnpm --filter @propertypro/db db:migrate

      - name: Run integration tests
        run: pnpm exec vitest run --config apps/web/vitest.integration.config.ts
