name: Scoped DB Access Guard

on:
  pull_request:
    paths:
      - apps/web/src/**
      - packages/db/src/**
      - scripts/verify-scoped-db-access.ts
      - package.json
      - pnpm-lock.yaml
  push:
    paths:
      - apps/web/src/**
      - packages/db/src/**
      - scripts/verify-scoped-db-access.ts
      - package.json
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  verify-scoped-db-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify scoped DB access guard
        run: pnpm guard:db-access
