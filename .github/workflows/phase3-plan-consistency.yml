name: Phase 3 Plan Consistency

on:
  pull_request:
    paths:
      - PHASE3_EXECUTION_PLAN.md
      - IMPLEMENTATION_PLAN.md
      - scripts/verify-phase3-plan-status.ts
      - specs/phase-3-pm-mobile/**
      - package.json
      - pnpm-lock.yaml
  workflow_dispatch:

jobs:
  verify-phase3-plan-status:
    runs-on: ubuntu-latest
    env:
      PHASE3_PLAN_VERIFY_STRICT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Phase 3 plan status consistency
        run: pnpm plan:verify:phase3
